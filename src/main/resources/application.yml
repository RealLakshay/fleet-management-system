# File purpose: Contains supporting implementation for the Fleet Management application.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:fleet_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true

springfox:
  enabled: true

